<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 48px 56px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
    p  { font-size: 15px; color: #666; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Service Unavailable</h1>
    <p>This service is currently undergoing scheduled maintenance.<br>Please check back later.</p>
  </div>
</body>
</html>
