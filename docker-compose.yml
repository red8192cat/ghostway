# ghostway — invisible MTProxy stack: telemt (FakeTLS) → xray (VLESS+Reality) → Telegram
# All configuration lives in .env — edit that file before first launch.

name: ghostway

services:

  # Init container: runs once, substitutes env vars into configs, then exits.
  # Uses alpine (has envsubst via gettext package) — never touches production images.
  init:
    image: alpine:3.19
    container_name: ghostway-init
    restart: "no"
    env_file: .env
    volumes:
      - ./xray.json:/templates/xray.json.tpl:ro
      - ./telemt.toml:/templates/telemt.toml.tpl:ro
      - generated:/generated
    command: >
      sh -c "
        apk add --no-cache gettext > /dev/null 2>&1 &&
        envsubst < /templates/xray.json.tpl > /generated/xray.json &&
        envsubst < /templates/telemt.toml.tpl > /generated/telemt.toml &&
        echo 'ghostway: configs generated'
      "

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    # Override default split-config dir with our single generated config file
    command: ["run", "-config", "/etc/ghostway/xray.json"]
    volumes:
      - generated:/etc/ghostway:ro
    networks:
      - proxy-net
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # No healthcheck possible — scratch image has no shell or network tools.
    # xray is considered healthy if the process starts without error.
    # telemt depends on xray via service_started (not service_healthy).

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    env_file: .env
    # Switch mask mode by copying the right snippet before caddy starts.
    # MASK_MODE=static (default) → serves site/index.html
    # MASK_MODE=proxy            → reverse-proxy to MASK_PROXY_TARGET
    command: >
      sh -c "
        if [ "$$MASK_MODE" = 'proxy' ]; then
          cp /etc/caddy/snippets/mask.proxy.caddy /etc/caddy/mask.caddy;
        else
          cp /etc/caddy/snippets/mask.static.caddy /etc/caddy/mask.caddy;
        fi &&
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
      "
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./mask.static.caddy:/etc/caddy/snippets/mask.static.caddy:ro
      - ./mask.proxy.caddy:/etc/caddy/snippets/mask.proxy.caddy:ro
      - ./site:/srv/site:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - proxy-net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    healthcheck:
      # Check that caddy process is running and HTTP port is accepting connections
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 > /dev/null 2>&1 || nc -z 127.0.0.1 80"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
      xray:
        condition: service_started
      caddy:
        condition: service_healthy
    ports:
      - "443:443"
      # Uncomment to expose API to host:
      # - "127.0.0.1:9091:9091"
    volumes:
      - generated:/etc/telemt:ro
      - telemt-cache:/data
    working_dir: /run/telemt
    tmpfs:
      - /run/telemt:rw,mode=1777,size=10m
    command: ["telemt", "/etc/telemt/telemt.toml"]
    environment:
      - RUST_LOG=info
    networks:
      - proxy-net
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    security_opt:
      - no-new-privileges:true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  generated:
    driver: local
  telemt-cache:
    driver: local
  caddy-data:
    # Contains the TLS certificate — never remove with "docker compose down -v"
    driver: local
  caddy-config:
    driver: local

networks:
  proxy-net:
    driver: bridge
    enable_ipv6: false
